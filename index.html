<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса и Кухня KL</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; max-width: 600px; margin: auto; background-color: #f0f0f5; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #333; margin-top: 0; }
        
        .tabs { display: flex; margin-bottom: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; font-weight: bold; cursor: pointer; color: #555; font-size: 14px;}
        .tab.active { background: #000; color: #fff; }
        .section { display: none; }
        .section.active { display: block; }

        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .product-btn { background: #f2f2f7; color: #000; border: 1px solid #d1d1d6; border-radius: 10px; padding: 12px 8px; font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .product-btn:active { background: #e5e5ea; transform: scale(0.98); }
        .product-btn span { font-size: 12px; color: #8e8e93; margin-top: 4px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        button { width: 100%; padding: 16px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; border: none; border-radius: 10px; }
        .btn-print { background: #000; color: #fff; }
        .btn-clear { background: #ff3b30; color: #fff; }
        .btn-action { background: #007aff; color: #fff; }
        .btn-success { background: #34c759; color: #fff; }
        
        .cashier-status-card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .msg-input-group { display: flex; gap: 5px; margin-top: 10px; }
        .msg-input-group input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        .msg-input-group button { width: auto; margin: 0; padding: 10px 20px; background: #007aff; color: white; border-radius: 8px; }

        #kitchen-orders { margin-top: 15px; }
        .kitchen-card { background: #fff; border: 2px solid #000; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .kitchen-card h3 { margin: 0 0 10px 0; border-bottom: 2px dashed #eee; padding-bottom: 5px; display: flex; justify-content: space-between;}
        .kitchen-item { font-size: 16px; margin-bottom: 5px; }
        .kitchen-msgs { margin-top:10px; background:#fff3cd; padding:10px; border-radius:8px; font-size:14px; border:1px solid #ffeeba; }
        
        .timer-buttons { display: flex; gap: 5px; margin-top: 15px; }
        .btn-time { flex: 1; padding: 10px; font-size: 14px; background: #eee; color: #000; border-radius: 8px; border: none; margin:0;}
        .btn-time:active { background: #ddd; }
        .timer-display { font-size: 28px; font-weight: bold; text-align: center; margin-top: 15px; }
        
        select { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; }
        #barcode-result { text-align: center; margin-top: 20px; display: none; background: white; padding: 20px; border-radius: 10px; border: 2px dashed #ccc;}
        #qrcode-container { display: flex; justify-content: center; margin-top: 10px; }
        
        #receipt-container { position: absolute; top: -9999px; left: -9999px; }
        #receipt { width: 384px; padding: 20px; background: white; color: black; font-family: 'Courier New', Courier, monospace; font-size: 24px; font-weight: bold; }
        #receipt h2 { font-size: 32px; margin: 10px 0; border-bottom: 2px dashed black; padding-bottom: 10px;}
        .receipt-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .receipt-total { border-top: 2px dashed black; padding-top: 10px; margin-top: 20px; font-size: 28px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('cashier', this)">🛒 Касса</div>
            <div class="tab" onclick="switchTab('kitchen', this)">👨‍🍳 Кухня</div>
            <div class="tab" onclick="switchTab('barcode-gen', this)">🏷️ QR</div>
        </div>

        <div id="cashier" class="section active">
            <h1>Касса KL</h1>
            <div id="reader"></div>
            
            <div class="products-grid" id="quick-products-container"></div>
            
            <h2>Сборка (Заказ №<span id="screen-order-num">1</span>)</h2>
            <div id="cart"></div>
            <h3 style="text-align: right;">Итого: <span id="total">0</span> ₽</h3>
            
            <button class="btn-print" onclick="generateAndShareReceipt()">🖨️ Чек в Fun Print</button>
            <button class="btn-success" onclick="sendToKitchen()">🍳 Отправить на кухню</button>
            <button class="btn-clear" onclick="cancelOrder()">🗑️ Очистить / Отменить</button>

            <div id="cashier-active-orders" style="margin-top: 30px;"></div>
        </div>

        <div id="kitchen" class="section">
            <h1>Заказы в работе</h1>
            <div id="kitchen-orders">
                <p style="text-align:center; color:#999;">Пока нет заказов</p>
            </div>
        </div>

        <div id="barcode-gen" class="section">
            <h1>Создать наклейку</h1>
            <select id="product-select"></select>
            <button class="btn-action" onclick="createBarcode()">Генерировать QR</button>
            <div id="barcode-result">
                <div id="qr-title" style="font-size: 20px; font-weight: bold; margin-bottom: 15px;">Название</div>
                <div id="qrcode-container"></div>
                <button class="btn-print" style="margin-top: 20px;" onclick="shareBarcode()">🖨️ В Fun Print</button>
            </div>
        </div>
    </div>

    <div id="receipt-container">
        <div id="receipt">
            <h2 style="text-align: center;">Маркетплейс KL</h2>
            <div style="text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px;">Заказ №<span id="receipt-order-num">1</span></div>
            <div style="text-align: center; margin-bottom: 20px;">Кассовый чек</div>
            <div id="receipt-items"></div>
            <div class="receipt-row receipt-total">
                <span>ИТОГО:</span>
                <span><span id="receipt-total">0</span> ₽</span>
            </div>
            <div style="text-align: center; margin-top: 30px; font-size: 18px;">
                Спасибо за покупку!<br>Ждем вас снова!
            </div>
        </div>
    </div>

    <script>
        const productsDB = {
            "300000000001": { name: "Лимонад Клубничный", price: 150 },
            "300000000002": { name: "Лимонад Лимонный", price: 100 },
            "300000000003": { name: "Лимонад Лаймовый", price: 100 },
            "300000000004": { name: "Лимонад Ягодный", price: 200 },
            "300000000005": { name: "Лимонад Мятный", price: 100 },
            "300000000006": { name: "Лимонад Стандарт", price: 200 },
            "300000000007": { name: "Вода со льдом", price: 5 },
            "300000000008": { name: "Вода без льда", price: 5 },
            "300000000009": { name: "Печенье Юбилейное (3 шт)", price: 10 },
            "300000000010": { name: "Баранки (3 шт)", price: 5 },
            "300000000011": { name: "Палочки", price: 10 } // <-- Добавлены палочки
        };

        let cart = [];
        let total = 0;
        let orderNumber = 1;
        let kitchenOrders = [];
        let html5QrcodeScanner;
        let qrCodeInstance = null;

        window.onload = function() {
            populateSelect();
            renderQuickProducts();
            initScanner();
            updateUI(); 
        };

        function switchTab(tabId, element) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function populateSelect() {
            const select = document.getElementById('product-select');
            for (const [code, product] of Object.entries(productsDB)) {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = `${product.name} - ${product.price} ₽`;
                select.appendChild(option);
            }
        }

        function renderQuickProducts() {
            const container = document.getElementById('quick-products-container');
            container.innerHTML = '';
            for (const [code, product] of Object.entries(productsDB)) {
                const button = document.createElement('div');
                button.className = 'product-btn';
                button.innerHTML = `${product.name} <span>${product.price} ₽</span>`;
                button.onclick = function() { addToCart(product); if ("vibrate" in navigator) navigator.vibrate(50); };
                container.appendChild(button);
            }
        }

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render((decodedText) => {
                if (productsDB[decodedText]) {
                    addToCart(productsDB[decodedText]);
                    if ("vibrate" in navigator) navigator.vibrate(200);
                    html5QrcodeScanner.pause();
                    setTimeout(() => html5QrcodeScanner.resume(), 1500);
                } else alert(`Код не найден!`);
            });
        }

        function addToCart(product) { cart.push(product); total += product.price; updateUI(); }
        function cancelOrder() { cart = []; total = 0; updateUI(); }

        function sendToKitchen() {
            if (cart.length === 0) return alert("Корзина пуста!");
            kitchenOrders.push({
                id: orderNumber,
                items: [...cart],
                timeSet: false,
                timeLeft: 0,
                interval: null,
                messages: []
            });
            orderNumber++;
            cart = [];
            total = 0;
            updateUI();
            renderKitchen();
            renderCashierActiveOrders();
        }

        function updateUI() {
            const cartDiv = document.getElementById('cart');
            const receiptItemsDiv = document.getElementById('receipt-items');
            document.getElementById('screen-order-num').innerText = orderNumber;
            document.getElementById('receipt-order-num').innerText = orderNumber;
            cartDiv.innerHTML = ''; receiptItemsDiv.innerHTML = '';
            
            cart.forEach(item => {
                cartDiv.innerHTML += `<div class="cart-item"><span>${item.name}</span><strong>${item.price} ₽</strong></div>`;
                receiptItemsDiv.innerHTML += `<div class="receipt-row"><span>${item.name}</span><span>${item.price}</span></div>`;
            });
            document.getElementById('total').innerText = total;
            document.getElementById('receipt-total').innerText = total;
        }

        function generateAndShareReceipt() {
            if (cart.length === 0) return alert("Добавьте товары!");
            shareElementToApp('receipt', `KL_receipt_${orderNumber}.png`);
        }

        function renderCashierActiveOrders() {
            const container = document.getElementById('cashier-active-orders');
            container.innerHTML = '';
            
            if (kitchenOrders.length > 0) {
                container.innerHTML = '<h2 style="border-top: 2px solid #ddd; padding-top: 20px;">Отправлено на кухню:</h2>';
            }

            kitchenOrders.forEach((order, index) => {
                let timeString = "Ожидает повара...";
                let color = "#666";
                let borderColor = "#ddd";
                
                if (order.timeSet) {
                    let m = Math.floor(order.timeLeft / 60);
                    let s = order.timeLeft % 60;
                    timeString = `Готовится: ${m}:${s < 10 ? '0' : ''}${s}`;
                    color = "#000";
                    borderColor = "#000";
                    
                    if (order.timeLeft === 0) {
                        timeString = "🔔 ГОТОВО К ВЫДАЧЕ!";
                        color = "#ff3b30";
                        borderColor = "#ff3b30";
                    }
                }

                container.innerHTML += `
                    <div class="cashier-status-card" id="cashier-card-${index}" style="border-color: ${borderColor}">
                        <div style="display:flex; justify-content:space-between; font-size: 16px;">
                            <strong>Заказ №${order.id}</strong>
                            <strong id="cashier-timer-${index}" style="color:${color}">${timeString}</strong>
                        </div>
                        <div class="msg-input-group">
                            <input type="text" id="msg-input-${index}" placeholder="Написать повару..." onkeypress="handleEnter(event, ${index})">
                            <button onclick="sendMessageToCook(${index})">📩 Отправить</button>
                        </div>
                    </div>
                `;
            });
        }

        function handleEnter(event, index) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                sendMessageToCook(index);
                document.getElementById(`msg-input-${index}`).blur(); 
            }
        }

        function sendMessageToCook(index) {
            let input = document.getElementById(`msg-input-${index}`);
            let text = input.value.trim();
            if (text === '') return;
            
            kitchenOrders[index].messages.push(text);
            input.value = ''; 
            
            renderKitchen(); 
            if ("vibrate" in navigator) navigator.vibrate(100); 
        }

        function renderKitchen() {
            const container = document.getElementById('kitchen-orders');
            container.innerHTML = '';
            
            if (kitchenOrders.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999;">Пока нет заказов</p>';
                return;
            }

            kitchenOrders.forEach((order, index) => {
                let itemsHtml = order.items.map(i => `<div class="kitchen-item">🔸 ${i.name}</div>`).join('');
                let timerHtml = '';
                let msgsHtml = '';

                if (order.messages.length > 0) {
                    msgsHtml = '<div class="kitchen-msgs"><strong>Уточнения с кассы:</strong><br>';
                    order.messages.forEach(msg => { msgsHtml += `💬 ${msg}<br>`; });
                    msgsHtml += '</div>';
                }

                if (!order.timeSet) {
                    timerHtml = `
                        <div class="timer-buttons">
                            <button class="btn-time" onclick="startTimer(${index}, 1)">1 мин</button>
                            <button class="btn-time" onclick="startTimer(${index}, 3)">3 мин</button>
                            <button class="btn-time" onclick="startTimer(${index}, 5)">5 мин</button>
                        </div>
                    `;
                } else {
                    let m = Math.floor(order.timeLeft / 60);
                    let s = order.timeLeft % 60;
                    let timeString = `${m}:${s < 10 ? '0' : ''}${s}`;
                    let color = order.timeLeft === 0 ? '#ff3b30' : '#000'; 
                    let text = order.timeLeft === 0 ? '🔔 ГОТОВО!' : timeString;
                    timerHtml = `<div id="kitchen-timer-${index}" class="timer-display" style="color: ${color}">${text}</div>`;
                }

                container.innerHTML += `
                    <div class="kitchen-card">
                        <h3>Заказ №${order.id}</h3>
                        ${itemsHtml}
                        ${msgsHtml}
                        ${timerHtml}
                        <button class="btn-action" style="margin-top:15px;" onclick="finishKitchenOrder(${index})">✅ Выдать заказ</button>
                    </div>
                `;
            });
        }

        function updateTimersOnly() {
            kitchenOrders.forEach((order, index) => {
                if (order.timeSet) {
                    let m = Math.floor(order.timeLeft / 60);
                    let s = order.timeLeft % 60;
                    let timeString = `${m}:${s < 10 ? '0' : ''}${s}`;
                    
                    let kTimer = document.getElementById(`kitchen-timer-${index}`);
                    if (kTimer) {
                        if (order.timeLeft === 0) {
                            kTimer.innerText = '🔔 ГОТОВО!';
                            kTimer.style.color = '#ff3b30';
                        } else {
                            kTimer.innerText = timeString;
                        }
                    }

                    let cTimer = document.getElementById(`cashier-timer-${index}`);
                    let cCard = document.getElementById(`cashier-card-${index}`);
                    if (cTimer && cCard) {
                        if (order.timeLeft === 0) {
                            cTimer.innerText = '🔔 ГОТОВО К ВЫДАЧЕ!';
                            cTimer.style.color = '#ff3b30';
                            cCard.style.borderColor = '#ff3b30';
                        } else {
                            cTimer.innerText = `Готовится: ${timeString}`;
                        }
                    }
                }
            });
        }

        function startTimer(index, minutes) {
            let order = kitchenOrders[index];
            order.timeSet = true;
            order.timeLeft = minutes * 60;
            
            renderKitchen();
            renderCashierActiveOrders();

            order.interval = setInterval(() => {
                if (order.timeLeft > 0) {
                    order.timeLeft--;
                } else {
                    clearInterval(order.interval);
                    if ("vibrate" in navigator) navigator.vibrate([500, 200, 500]);
                }
                
                updateTimersOnly();
                
            }, 1000);
        }

        function finishKitchenOrder(index) {
            if (kitchenOrders[index].interval) clearInterval(kitchenOrders[index].interval);
            kitchenOrders.splice(index, 1);
            renderKitchen();
            renderCashierActiveOrders();
        }

        function createBarcode() {
            const select = document.getElementById('product-select');
            const code = select.value;
            const productName = productsDB[code].name;
            document.getElementById('qr-title').innerText = productName;
            const qrContainer = document.getElementById('qrcode-container');
            qrContainer.innerHTML = ''; 
            qrCodeInstance = new QRCode(qrContainer, { text: code, width: 200, height: 200, colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H });
            document.getElementById('barcode-result').style.display = 'block';
        }

        function shareBarcode() { shareElementToApp('barcode-result', 'KL_QR.png'); }

        function shareElementToApp(elementId, fileName) {
            const element = document.getElementById(elementId);
            html2canvas(element, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
                canvas.toBlob(function(blob) {
                    const file = new File([blob], fileName, { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ files: [file], title: fileName }).catch(console.error);
                    } else {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url; link.download = fileName; link.click();
                        URL.revokeObjectURL(url);
                    }
                }, 'image/png');
            });
        }
    </script>
</body>
</html>
