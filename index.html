<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Касса и Штрих-коды KL</title>
    
    <!-- Библиотеки (для работы локально без интернета их нужно будет скачать) -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 15px; 
            max-width: 600px; 
            margin: auto; 
            background-color: #f0f0f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: #333; margin-top: 0; }
        
        .tabs { display: flex; margin-bottom: 20px; background: #eee; border-radius: 10px; overflow: hidden; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; color: #555; }
        .tab.active { background: #000; color: #fff; }
        
        .section { display: none; }
        .section.active { display: block; }

        /* Касса */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        
        .products-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; 
        }
        .product-btn {
            background: #f2f2f7; color: #000; border: 1px solid #d1d1d6; border-radius: 10px;
            padding: 12px 8px; font-size: 14px; font-weight: 600; text-align: center;
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
        }
        .product-btn:active { background: #e5e5ea; transform: scale(0.98); }
        .product-btn span { font-size: 12px; color: #8e8e93; margin-top: 4px; }

        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        button { 
            width: 100%; padding: 16px; font-size: 16px; font-weight: bold;
            margin-top: 10px; cursor: pointer; border: none; border-radius: 10px;
        }
        .btn-print { background: #000; color: #fff; }
        .btn-clear { background: #ff3b30; color: #fff; }
        .btn-action { background: #007aff; color: #fff; }
        
        /* Генератор QR-кодов */
        select { width: 100%; padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; }
        #barcode-result { text-align: center; margin-top: 20px; display: none; background: white; padding: 20px; border-radius: 10px; border: 2px dashed #ccc;}
        #qrcode-container { display: flex; justify-content: center; margin-top: 10px; }
        #qr-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }

        /* Чек для принтера */
        #receipt-container { position: absolute; top: -9999px; left: -9999px; }
        #receipt { 
            width: 384px; padding: 20px; background: white; color: black;
            font-family: 'Courier New', Courier, monospace; font-size: 24px; font-weight: bold;
        }
        #receipt h2 { font-size: 32px; margin: 10px 0; border-bottom: 2px dashed black; padding-bottom: 10px;}
        .receipt-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .receipt-total { border-top: 2px dashed black; padding-top: 10px; margin-top: 20px; font-size: 28px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('cashier', this)">🛒 Касса</div>
            <div class="tab" onclick="switchTab('barcode-gen', this)">🏷️ QR-коды</div>
        </div>

        <div id="cashier" class="section active">
            <h1>Касса KL</h1>
            <div id="reader"></div>
            
            <h2>Меню:</h2>
            <div class="products-grid" id="quick-products-container"></div>
            
            <!-- Добавлен вывод номера заказа на экран -->
            <h2>Корзина (Заказ №<span id="screen-order-num">1</span>):</h2>
            <div id="cart"></div>
            <h3 style="text-align: right;">Итого: <span id="total">0</span> ₽</h3>
            
            <button class="btn-print" onclick="generateAndShareReceipt()">🖨️ Чек в Fun Print</button>
            <button class="btn-clear" onclick="clearCart()">🗑️ Очистить чек (След. заказ)</button>
        </div>

        <div id="barcode-gen" class="section">
            <h1>Создать наклейку</h1>
            <select id="product-select"></select>
            <button class="btn-action" onclick="createBarcode()">Генерировать QR</button>

            <div id="barcode-result">
                <div id="qr-title">Название</div>
                <div id="qrcode-container"></div>
                <button class="btn-print" style="margin-top: 20px;" onclick="shareBarcode()">🖨️ Наклейку в Fun Print</button>
            </div>
        </div>
    </div>

    <div id="receipt-container">
        <div id="receipt">
            <h2 style="text-align: center;">Маркетплейс KL</h2>
            <!-- Вывод номера заказа в чек -->
            <div style="text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px;">Заказ №<span id="receipt-order-num">1</span></div>
            <div style="text-align: center; margin-bottom: 20px;">Кассовый чек</div>
            
            <div id="receipt-items"></div>
            
            <div class="receipt-row receipt-total">
                <span>ИТОГО:</span>
                <span><span id="receipt-total">0</span> ₽</span>
            </div>
            <div style="text-align: center; margin-top: 30px; font-size: 18px;">
                Спасибо за покупку!<br>Ждем вас снова!
            </div>
        </div>
    </div>

    <script>
        // НОВОЕ МЕНЮ (Удалил старое, добавил лимонады)
        const productsDB = {
            "200000000001": { name: "Лимонад (Классика)", price: 100 },
            "200000000002": { name: "Лимонад (Клубника)", price: 120 },
            "200000000003": { name: "Лимонад (Мята)", price: 120 },
            "200000000004": { name: "Доп. сироп", price: 30 }
        };

        let cart = [];
        let total = 0;
        let orderNumber = 1; // Счетчик заказов
        let html5QrcodeScanner;
        let qrCodeInstance = null;

        window.onload = function() {
            populateSelect();
            renderQuickProducts();
            initScanner();
            updateUI(); // Инициализация интерфейса при старте
        };

        function switchTab(tabId, element) {
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function populateSelect() {
            const select = document.getElementById('product-select');
            for (const [code, product] of Object.entries(productsDB)) {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = `${product.name} - ${product.price} ₽`;
                select.appendChild(option);
            }
        }

        function renderQuickProducts() {
            const container = document.getElementById('quick-products-container');
            container.innerHTML = '';
            for (const [code, product] of Object.entries(productsDB)) {
                const button = document.createElement('div');
                button.className = 'product-btn';
                button.innerHTML = `${product.name} <span>${product.price} ₽</span>`;
                button.onclick = function() {
                    addToCart(product);
                    if ("vibrate" in navigator) navigator.vibrate(50);
                };
                container.appendChild(button);
            }
        }

        function initScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            if (productsDB[decodedText]) {
                addToCart(productsDB[decodedText]);
                if ("vibrate" in navigator) navigator.vibrate(200);
                html5QrcodeScanner.pause();
                setTimeout(() => html5QrcodeScanner.resume(), 1500);
            } else {
                alert(`Код ${decodedText} не найден в базе!`);
            }
        }

        function addToCart(product) {
            cart.push(product);
            total += product.price;
            updateUI();
        }

        // Очистка корзины и смена номера заказа
        function clearCart() {
            if (cart.length > 0) {
                orderNumber++; // Увеличиваем номер заказа только если в чеке что-то было
            }
            cart = [];
            total = 0;
            updateUI();
        }

        function updateUI() {
            const cartDiv = document.getElementById('cart');
            const receiptItemsDiv = document.getElementById('receipt-items');
            
            // Обновляем номера заказов
            document.getElementById('screen-order-num').innerText = orderNumber;
            document.getElementById('receipt-order-num').innerText = orderNumber;
            
            cartDiv.innerHTML = '';
            receiptItemsDiv.innerHTML = '';
            
            cart.forEach(item => {
                cartDiv.innerHTML += `<div class="cart-item"><span>${item.name}</span><strong>${item.price} ₽</strong></div>`;
                receiptItemsDiv.innerHTML += `<div class="receipt-row"><span>${item.name}</span><span>${item.price}</span></div>`;
            });

            document.getElementById('total').innerText = total;
            document.getElementById('receipt-total').innerText = total;
        }

        function generateAndShareReceipt() {
            if (cart.length === 0) return alert("Сначала добавьте товары в заказ!");
            shareElementToApp('receipt', `KL_receipt_order_${orderNumber}.png`);
        }

        function createBarcode() {
            const select = document.getElementById('product-select');
            const code = select.value;
            const productName = productsDB[code].name;
            
            document.getElementById('qr-title').innerText = productName;
            
            const qrContainer = document.getElementById('qrcode-container');
            qrContainer.innerHTML = ''; 
            
            qrCodeInstance = new QRCode(qrContainer, {
                text: code,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H 
            });
            
            document.getElementById('barcode-result').style.display = 'block';
        }

        function shareBarcode() {
            shareElementToApp('barcode-result', 'KL_QR.png');
        }

        function shareElementToApp(elementId, fileName) {
            const element = document.getElementById(elementId);
            
            html2canvas(element, { backgroundColor: "#ffffff", scale: 2 }).then(canvas => {
                canvas.toBlob(function(blob) {
                    const file = new File([blob], fileName, { type: 'image/png' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({ files: [file], title: fileName })
                        .catch(console.error);
                    } else {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url; link.download = fileName; link.click();
                        URL.revokeObjectURL(url);
                    }
                }, 'image/png');
            });
        }
    </script>
</body>
</html>
